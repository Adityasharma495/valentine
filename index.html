<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Valentine Proposal 💖</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 💖 Hearts Background */
.hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 0;
}

.heart {
    position: absolute;
    color: rgba(255, 0, 100, 0.7);
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {
        transform: translateY(100vh);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}

/* Main Box */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-width: 350px;
    width: 90%;
}

h1 {
    color: #ff4d6d;
}

.btn {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
}

.yes {
    background: #28a745;
    color: white;
}

.no {
    background: #dc3545;
    color: white;
    position: relative;
}

.message {
    margin-top: 20px;
    font-size: 18px;
    color: #333;
}

/* Success Screen */
.success {
    display: none;
}

.big-heart {
    font-size: 60px;
    animation: beat 1s infinite;
}

@keyframes beat {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}
</style>

</head>

<body>

<!-- 💖 Background Hearts -->
<div class="hearts" id="hearts"></div>

<!-- Main Box -->
<div class="container" id="mainBox">
    <h1>GuNu💕,Will you be my Valentine? 💖</h1>
    
    <button class="btn yes" onclick="yesClicked()">Yes ❤️</button>
    <button class="btn no" onclick="noClicked()">No 💔</button>

    <div class="message" id="msg"></div>
</div>

<!-- Success Box -->
<div class="container success" id="successBox">
    <div class="big-heart">❤️</div>
    <h1>Yayyyyy!!! 😍</h1>
    <p><b>You made my day 💕</b><br><b>I love you so much 🥰</b></p>
</div>

<script>
// 💖 Hearts create
function createHearts() {
    const container = document.getElementById("hearts");

    for (let i = 0; i < 25; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (3 + Math.random() * 3) + "s";
        heart.style.fontSize = (15 + Math.random() * 20) + "px";

        container.appendChild(heart);
    }
}
createHearts();

// No button logic
let messages = [
    "Think again 🤔",
    "Are you sure? 😢",
    "Why stay single? 💔",
    "Please maan jao 😭",
    "Last chance 😳",
    "sochlo na frse😒"
];

let count = 0;

function noClicked() {
    let msg = document.getElementById("msg");
    msg.innerText = messages[count % messages.length];
    count++;

    let btn = document.querySelector(".no");
    btn.style.position = "absolute";
    btn.style.top = Math.random() * 70 + "%";
    btn.style.left = Math.random() * 70 + "%";
}

// Yes button
function yesClicked() {
    document.getElementById("mainBox").style.display = "none";
    document.getElementById("successBox").style.display = "block";
}
</script>

</body>
</html>
